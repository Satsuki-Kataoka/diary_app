<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>日記アプリ</h1>
    </header>

    <main>
        <section class="entry-form">
            <h2>今日の日記を書く</h2>
            <div class="emotion-selector">
                <p>今の気分は？ (感情だけでもOK)</p>
                <button class="emotion-btn" data-emotion="😊">😊 嬉しい</button>
                <button class="emotion-btn" data-emotion="😢">😢 悲しい</button>
                <button class="emotion-btn" data-emotion="😠">😠 怒り</button>
                <button class="emotion-btn" data-emotion="😐">😐 普通</button>
                <input type="hidden" id="selected-emotion" value="">
            </div>
            <textarea id="diary-content" placeholder="今日の出来事を書いてみよう…"></textarea>
            <button id="save-btn">日記を保存する</button>
        </section>

        <section class="past-diaries">
            <h2>過去の日記</h2>
            <div id="diaries-list">
                <!-- ここに過去の日記が読み込まれます -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
